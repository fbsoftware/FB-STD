<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background:#cacaca ;
        }
        
        #elemento {
            background: #4CAF50;
            height: 100px;
            margin-top: 20px;
            transition: width 0.3s;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div>
<div class="container" style="    display: flex;
    flex-direction: row;
    justify-content: start; ">
    <label for="myRange">Larghezza: <span id="rangeValue">50</span>%</label>
    <input type="range" id="myRange" min="0" max="100" value="50" style="width: 100%; cursor: pointer;">
   
</div>
 <div id="elemento"></div>
</div>
<script>
$(document).ready(function() {
    $('#myRange').on('input', function() {
        const value = $(this).val();
        $('#elemento').css('width', value + '%');
        $('#rangeValue').text(value);
    });
    
    // Inizializzare
    $('#myRange').trigger('input');
});
</script>

</body>
</html>

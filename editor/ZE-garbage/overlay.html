<!DOCTYPE html>
<html>
<head>
    <style>
        /* Sezione con larghezza massima fissata */
        section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
            border: 2px solid #ddd;
        }

        /* Container delle colonne */
        .columns-container {
            display: flex;
            gap: 20px;
        }

        /* Colonne con max-width proporzionale */
        .column {
            flex: 1;  /* Divide lo spazio equamente */
            max-width: calc(50% - 10px);  /* 50% meno il gap */
            background: white;
            padding: 15px;
            border: 1px solid #ccc;
            box-sizing: border-box;  /* IMPORTANTE! */
        }
    </style>
</head>
<body>

<section>
    <div class="columns-container">
        <div class="column">
            <h3>Colonna 1</h3>
            <p>Contenuto che non supera il max-width</p>
        </div>
        <div class="column">
            <h3>Colonna 2</h3>
            <p>Contenuto che non supera il max-width</p>
        </div>
    </div>
</section>

</body>
</html>
